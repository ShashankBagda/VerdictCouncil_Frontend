name: verdictcouncil-frontend-production
region: sgp
static_sites:
  - name: web
    github:
      repo: ShashankBagda/VerdictCouncil_Frontend
      branch: main
      deploy_on_push: false
    source_dir: /
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    environment_slug: node-js
    envs:
      - key: VITE_API_URL
        value: https://api.verdictcouncil.sg
        scope: BUILD_TIME
