name: Frontend CI

# ── Trigger ──────────────────────────────────────────────────────────────────
# Direct pushes fire CI on long-lived branches + all feature branches.
# cd.yml and staging-deploy.yml use `workflow_run` instead of `push` so only
# ONE workflow fires per commit — no duplicate runs.
on:
  push:
    branches:
      - main
      - development
      - "release/**"
      - "feat/**"
  pull_request:
    branches:
      - main
      - development

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests with 100% coverage
        # continue-on-error removed: test failures must break the build
        run: npm run test -- --run --coverage --reporter=verbose
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

  sast:
    name: SAST (Static Application Security Testing)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Semgrep — OWASP Top-10 + security-audit
        run: |
          pip install semgrep
          semgrep --config=p/security-audit \
                  --config=p/owasp-top-ten \
                  --sarif -o semgrep.sarif \
                  src/ || true
        continue-on-error: true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  build:
    name: build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build production bundle
        run: npm run build

  sca:
    name: SCA (Software Composition Analysis)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: npm audit — CVE check
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Generate CycloneDX SBOM
        run: |
          npm install --save-dev @cyclonedx/cyclonedx-npm
          npx cyclonedx-npm --output-format json --output-file sbom.json || true
        continue-on-error: true
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-sbom
          path: sbom.json

  dast:
    name: DAST (Dynamic Application Security Testing)
    runs-on: ubuntu-latest
    needs: sca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build application
        run: npm run build
      - name: Serve and check security headers
        run: |
          npx serve -s dist -l 3000 &
          # Wait until the server is ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 && break || sleep 1
          done
          node -e "
          const http = require('http');
          http.get('http://localhost:3000', (res) => {
            const h = res.headers;
            console.log(JSON.stringify({
              status: res.statusCode,
              'x-content-type-options': h['x-content-type-options'] || 'MISSING',
              'x-frame-options': h['x-frame-options'] || 'MISSING',
              'cache-control': h['cache-control'] || 'MISSING',
            }, null, 2));
          }).on('error', (e) => { console.error(e.message); process.exit(0); });
          "
        continue-on-error: true
      - name: API contract tests
        run: npm run check:contract || true
        continue-on-error: true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, sast, build, dast]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: npm audit report
        run: npm audit --audit-level=moderate || true
      - name: Print CI result
        run: |
          echo "unit-tests : ${{ needs.unit-tests.result }}"
          echo "sast       : ${{ needs.sast.result }}"
          echo "build      : ${{ needs.build.result }}"
          echo "dast       : ${{ needs.dast.result }}"
