name: Frontend CI

on:
  push:
    branches:
      - main
      - development
      - release
  pull_request:
    branches:
      - main
      - development
      - release

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test -- --run --coverage
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        continue-on-error: true

  sast:
    runs-on: ubuntu-latest
    needs: lint
    name: SAST (Static Application Security Testing)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint security checks
      - name: ESLint Security Plugin
        run: |
          npm install --save-dev eslint-plugin-security
          npm run lint || true
        continue-on-error: true

      # Semgrep for JavaScript/React
      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep --config=p/security-audit --config=p/owasp-top-ten --json -o semgrep-report.json src/ || true
        continue-on-error: true

      # Upload SARIF for GitHub Security tab
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep-report.json
        continue-on-error: true

  sca:
    runs-on: ubuntu-latest
    needs: lint
    name: SCA (Software Composition Analysis)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm audit - built-in dependency vulnerability scanner
      - name: npm Audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      # SBOM generation with CycloneDX
      - name: Generate SBOM
        run: |
          npm install --save-dev @cyclonedx/npm
          npx cyclonedx-npm --output-format json --output-file sbom.json || true
        continue-on-error: true

      # Snyk (optional - requires setup)
      - name: Snyk Security Scan
        run: |
          npm install -g snyk
          snyk test --json-file-output=snyk-report.json || true
        continue-on-error: true

  dast:
    runs-on: ubuntu-latest
    needs: sca
    name: DAST (Dynamic Application Security Testing)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Install HTTP Server
        run: npm install -g http-server

      - name: Start dev server
        run: |
          http-server dist/ -p 3000 &
          sleep 3

      # Basic security header checks
      - name: Check Security Headers
        run: |
          npm install -g jest-html-reporter
          node -e "
          const http = require('http');
          http.get('http://localhost:3000', (res) => {
            console.log('Status:', res.statusCode);
            console.log('Headers:');
            console.log('  X-Content-Type-Options:', res.headers['x-content-type-options']);
            console.log('  X-Frame-Options:', res.headers['x-frame-options']);
            console.log('  Content-Security-Policy:', res.headers['content-security-policy']);
          });
          "
        continue-on-error: true

      # Contract testing with backend
      - name: API Contract Tests
        run: npm run test:contract || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  security-summary:
    runs-on: ubuntu-latest
    needs: [dast, unit-tests, sast, build]
    name: Security Summary
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit Report
        run: |
          echo "=== npm audit ===" 
          npm audit --audit-level=moderate || true
          echo ""
          echo "=== Code Quality ===" 
          npm run lint || true
        continue-on-error: true
