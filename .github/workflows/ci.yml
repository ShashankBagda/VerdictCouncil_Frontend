name: Frontend CI

on:
  push:
    branches:
      - main
      - development
      - release
      - 'feat/**'
  pull_request:
    branches:
      - main
      - development
      - release

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests with coverage (100% threshold)
        run: npm run test -- --run --coverage --coverage.thresholds.lines=100 --coverage.thresholds.statements=100 --coverage.thresholds.functions=100

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        continue-on-error: true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    name: E2E Tests (Playwright)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/reports/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  visual-regression:
    runs-on: ubuntu-latest
    needs: build
    name: Visual Regression (Playwright Snapshots)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Run visual regression tests
        run: npx playwright test e2e/visual.spec.js --project=chromium
        env:
          CI: true
        continue-on-error: true

      - name: Upload snapshot diff artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-diffs
          path: |
            test-results/
            e2e/snapshots/
          retention-days: 14

  accessibility-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    name: Accessibility Tests (jest-axe + Playwright axe)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit-level accessibility tests (jest-axe)
        run: npx vitest run --config vitest.config.js src/__tests__/accessibility.test.jsx

  storybook-tests:
    runs-on: ubuntu-latest
    needs: lint
    name: Storybook Component Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      - name: Run Storybook test runner
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && npm run test:storybook -- --ci"
        continue-on-error: true

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 7

  mutation-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    name: Mutation Testing (Stryker)
    # Mutation tests are advisory — they inform quality but don't gate the build
    # Run only on main and development branches due to time cost
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker mutation tests
        run: npm run test:mutation
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    name: Lighthouse CI Performance Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Run Lighthouse CI
        run: npm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14

  sast:
    runs-on: ubuntu-latest
    needs: lint
    name: SAST (Static Application Security Testing)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint security checks
      - name: ESLint Security Plugin
        run: |
          npm install --save-dev eslint-plugin-security
          npm run lint || true
        continue-on-error: true

      # Semgrep for JavaScript/React
      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep --config=p/security-audit --config=p/owasp-top-ten --json -o semgrep-report.json src/ || true
        continue-on-error: true

      # Upload SARIF for GitHub Security tab
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-report.json
        continue-on-error: true

  sca:
    runs-on: ubuntu-latest
    needs: lint
    name: SCA (Software Composition Analysis)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm audit - built-in dependency vulnerability scanner
      - name: npm Audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      # SBOM generation with CycloneDX
      - name: Generate SBOM
        run: |
          npm install --save-dev @cyclonedx/npm
          npx cyclonedx-npm --output-format json --output-file sbom.json || true
        continue-on-error: true

      # Snyk (optional - requires setup)
      - name: Snyk Security Scan
        run: |
          npm install -g snyk
          snyk test --json-file-output=snyk-report.json || true
        continue-on-error: true

  dast:
    runs-on: ubuntu-latest
    needs: sca
    name: DAST (Dynamic Application Security Testing)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Install HTTP Server
        run: npm install -g http-server

      - name: Start dev server
        run: |
          http-server dist/ -p 3000 &
          sleep 3

      # Basic security header checks
      - name: Check Security Headers
        run: |
          npm install -g jest-html-reporter
          node -e "
          const http = require('http');
          http.get('http://localhost:3000', (res) => {
            console.log('Status:', res.statusCode);
            console.log('Headers:');
            console.log('  X-Content-Type-Options:', res.headers['x-content-type-options']);
            console.log('  X-Frame-Options:', res.headers['x-frame-options']);
            console.log('  Content-Security-Policy:', res.headers['content-security-policy']);
          });
          "
        continue-on-error: true

      # Contract testing with backend
      - name: API Contract Tests
        run: npm run test:contract || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  security-summary:
    runs-on: ubuntu-latest
    needs: [dast, unit-tests, sast, build, e2e-tests, accessibility-tests, storybook-tests, lighthouse]
    name: Security & Quality Summary
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit Report
        run: |
          echo "=== npm audit ===" 
          npm audit --audit-level=moderate || true
          echo ""
          echo "=== Code Quality ===" 
          npm run lint || true
          echo ""
          echo "=== Test Coverage Summary ==="
          npm run test -- --run --coverage --reporter=verbose || true
        continue-on-error: true
