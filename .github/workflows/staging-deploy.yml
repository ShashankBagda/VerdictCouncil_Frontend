name: Deploy to Staging

# ── Trigger ──────────────────────────────────────────────────────────────────
# Fires ONLY after the Frontend CI workflow passes on `development`.
# This eliminates the double-trigger where ci.yml + staging-deploy.yml both
# fired on every push to development.
on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [development]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger App Platform deployment
        run: |
          doctl apps create-deployment \
            ${{ secrets.DO_APP_ID_STAGING }} \
            --force-rebuild \
            --wait
